<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Highlighter</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body {
            font-family: sans-serif; background:#333; color:#fff;
            display:flex; flex-direction:column; height:100vh;
            overflow:hidden; touch-action:none;
        }
        #toolbar {
            background:#222; padding:6px; display:flex; flex-wrap:wrap;
            align-items:center; gap:6px; position:fixed; top:0; width:100%;
            z-index:10; min-height:50px;
        }
        #toolbar button, #toolbar input {
            font-size:13px; padding:6px 8px; border:none; border-radius:4px;
            background:#444; color:#fff; white-space:nowrap;
        }
        #toolbar button:disabled { opacity:0.4; }
        #fileInput { width:auto; min-width:80px; background:#555; }
        #toolbar span { font-size:12px; color:#aaa; white-space:nowrap; }

        #page-container {
            margin-top:60px; flex:1; background:#525659;
            overflow:hidden; position:relative;
            display:flex; justify-content:center; align-items:flex-start;
        }
        .page-wrapper {
            position:absolute; top:0; left:50%;  /* centered horizontally */
            transform-origin:0 0;
            will-change:transform;   /* hardware‑accelerated */
        }
        canvas { display:block; }
        .textLayer {
            position:absolute; left:0; top:0; width:100%; height:100%;
            overflow:hidden; opacity:0.25; line-height:1.0; color:transparent;
            pointer-events:auto;
        }
        .textLayer span {
            color:transparent; position:absolute; white-space:pre;
            cursor:text; transform-origin:0% 0%;
        }
        .textLayer ::selection { background: rgba(0,0,255,0.3); }

        @media (max-width:400px) {
            #toolbar button { font-size:11px; padding:5px 6px; }
            #toolbar span { font-size:11px; }
            #page-container { margin-top:56px; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="fileInput" accept="application/pdf">
        <button id="prevBtn" disabled>◀ Prev</button>
        <span id="pageInfo">0 / 0</span>
        <button id="nextBtn" disabled>Next ▶</button>
        <button id="highlightBtn" disabled>Highlight</button>
        <button id="removeBtn" disabled>Undo</button>
        <button id="zoomOutBtn" disabled>− Zoom</button>
        <button id="zoomInBtn" disabled>+ Zoom</button>
        <span>Scale: <span id="zoomLevel">1.5</span>x</span>
        <span style="font-size:11px; color:#aaa;">(Tap highlight to delete)</span>
    </div>

    <div id="page-container">
        <div class="page-wrapper" id="pageWrapper">
            <canvas id="pdfCanvas"></canvas>
            <div id="textLayer" class="textLayer"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ─── DOM elements ───
        const fileInput = document.getElementById('fileInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomLevelSpan = document.getElementById('zoomLevel');
        const pageInfo = document.getElementById('pageInfo');
        const highlightBtn = document.getElementById('highlightBtn');
        const removeBtn = document.getElementById('removeBtn');
        const canvas = document.getElementById('pdfCanvas');
        const textLayerDiv = document.getElementById('textLayer');
        const pageWrapper = document.getElementById('pageWrapper');
        const pageContainer = document.getElementById('page-container');
        const ctx = canvas.getContext('2d');

        const dpr = window.devicePixelRatio || 1;
        const MIN_SCALE = 0.5;
        const MAX_SCALE = 3.0;
        const RENDER_UPSCALE = 2.0;   // render at 2x the maximum zoom for crispness

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let pageNaturalSize = { width: 0, height: 0 };   // PDF points

        // State
        let currentScale = 1.5;          // logical zoom level
        let baseOffsetX = 0, baseOffsetY = 0;   // pan offset (px) after last commit
        let viewTransform = { scale: currentScale, x: 0, y: 0 };   // live transform

        // Highlights in point space (same as PDF coordinates)
        let highlights = {};

        // Cached high‑res bitmap for current page
        let cachedBitmap = null;

        // ─── Apply CSS transform smoothly ───
        function applyTransform() {
            const { scale, x, y } = viewTransform;
            pageWrapper.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        }

        // ─── Commit current zoom/pan: re‑render at exact scale, reset transform to identity ───
        async function commitView() {
            // Set baseOffset to current pan position
            baseOffsetX = viewTransform.x;
            baseOffsetY = viewTransform.y;
            currentScale = viewTransform.scale;

            // Re‑render the page at this scale (will be sharp)
            await renderPageAtExactScale(currentPage, currentScale);

            // Reset transform to identity (since we've baked the scale into the canvas)
            viewTransform = { scale: 1, x: 0, y: 0 };
            applyTransform();

            // Center the page horizontally (the wrapper will be positioned)
            updatePagePosition();
            updateUI();
        }

        // ─── Render page at a given scale (sharp, used after commit) ───
        async function renderPageAtExactScale(pageNum, scale) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(pageNum);
            pageNaturalSize = { width: page.getViewport({ scale:1 }).width, height: page.getViewport({ scale:1 }).height };

            const renderScale = scale * dpr;
            const viewport = page.getViewport({ scale: renderScale });

            // Resize canvas
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = (viewport.width / dpr) + 'px';
            canvas.style.height = (viewport.height / dpr) + 'px';

            // Clear and render
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            await page.render({ canvasContext: ctx, viewport }).promise;

            // Build text layer at logical size
            await buildTextLayer(pageNum, scale);

            // Draw highlights (they are in point coords)
            drawHighlights(pageNum, scale);

            // Update page natural size for future panning limits etc.
            cachedBitmap = null;   // we'll re‑render next time anyway
        }

        // ─── Build text layer for the current scale ───
        async function buildTextLayer(pageNum, scale) {
            textLayerDiv.innerHTML = '';
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });   // logical size
            textLayerDiv.style.width = viewport.width + 'px';
            textLayerDiv.style.height = viewport.height + 'px';
            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({
                textContentSource: textContent,
                container: textLayerDiv,
                viewport,
                textDivs: []
            });
        }

        // ─── Draw highlights on canvas (point coords) ───
        function drawHighlights(pageNum, scale) {
            if (!highlights[pageNum]) return;
            const factor = scale * dpr;
            ctx.save();
            highlights[pageNum].forEach(h => {
                ctx.fillStyle = h.color || 'rgba(255,255,0,0.4)';
                ctx.fillRect(h.x * factor, h.y * factor, h.w * factor, h.h * factor);
            });
            ctx.restore();
        }

        // ─── Position the wrapper after commit (center horizontally) ───
        function updatePagePosition() {
            const containerWidth = pageContainer.clientWidth;
            const canvasDisplayWidth = parseFloat(canvas.style.width) || (canvas.width / dpr);
            // Center horizontally: left = (containerWidth - canvasDisplayWidth) / 2
            const left = Math.max(0, (containerWidth - canvasDisplayWidth) / 2);
            pageWrapper.style.left = left + 'px';
            pageWrapper.style.top = baseOffsetY + 'px';   // keep vertical offset from panning
        }

        // ─── Navigate to page ───
        async function goToPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;
            currentPage = pageNum;
            highlights[pageNum] = highlights[pageNum] || [];
            // Reset view
            currentScale = 1.5;
            viewTransform = { scale: 1, x: 0, y: 0 };
            baseOffsetX = 0;
            baseOffsetY = 0;
            await commitView();
            preloadAdjacent(pageNum);
        }

        // ─── Zoom buttons ───
        async function setScale(newScale) {
            newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
            currentScale = newScale;
            viewTransform = { scale: 1, x: 0, y: 0 };
            baseOffsetX = 0;
            baseOffsetY = 0;
            await commitView();
        }

        zoomInBtn.addEventListener('click', () => setScale(currentScale + 0.25));
        zoomOutBtn.addEventListener('click', () => setScale(currentScale - 0.25));

        // ─── Highlighting (point coords) ───
        async function addHighlightFromSelection() {
            const selection = window.getSelection();
            if (!selection.rangeCount) { alert('Select some text first.'); return; }
            const range = selection.getRangeAt(0);
            const canvasRect = canvas.getBoundingClientRect();
            const scale = currentScale;
            if (!highlights[currentPage]) highlights[currentPage] = [];
            const rects = range.getClientRects();
            for (let i = 0; i < rects.length; i++) {
                let r = rects[i];
                // Convert from screen (canvas display) to point coordinates
                const x = (r.left - canvasRect.left) / scale;
                const y = (r.top - canvasRect.top) / scale;
                const w = r.width / scale;
                const h = r.height / scale;
                if (w > 0 && h > 0) {
                    highlights[currentPage].push({ x, y, w, h, color: 'rgba(255,255,0,0.4)' });
                }
            }
            selection.removeAllRanges();
            // Re‑draw highlights on canvas
            await commitView();   // this re‑renders the page with highlights
        }

        async function removeLastHighlight() {
            if (!highlights[currentPage] || highlights[currentPage].length === 0) {
                alert('No highlight on this page.'); return;
            }
            highlights[currentPage].pop();
            await commitView();
        }

        async function handleCanvasClick(e) {
            if (!highlights[currentPage]) return;
            const canvasRect = canvas.getBoundingClientRect();
            // Mouse in logical (display) coordinates
            const mx = e.clientX - canvasRect.left;
            const my = e.clientY - canvasRect.top;
            const scale = currentScale;
            // Convert to point space
            const px = mx / scale;
            const py = my / scale;
            const pageHighlights = highlights[currentPage];
            for (let i = pageHighlights.length - 1; i >= 0; i--) {
                const h = pageHighlights[i];
                if (px >= h.x && px <= h.x + h.w && py >= h.y && py <= h.y + h.h) {
                    pageHighlights.splice(i, 1);
                    await commitView();
                    return;
                }
            }
        }

        // ─── Touch handling for pan & pinch ───
        let touchState = {
            mode: 'idle',           // 'pan', 'pinch'
            startX: 0, startY: 0,
            startPanX: 0, startPanY: 0,   // pan offsets at touch start
            pinchDistStart: 0,
            pinchScaleStart: 1
        };

        function getTouchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.hypot(dx, dy);
        }

        pageContainer.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                touchState.mode = 'pan';
                touchState.startX = e.touches[0].clientX;
                touchState.startY = e.touches[0].clientY;
                touchState.startPanX = viewTransform.x;
                touchState.startPanY = viewTransform.y;
                e.preventDefault();
            } else if (e.touches.length === 2) {
                touchState.mode = 'pinch';
                touchState.pinchDistStart = getTouchDist(e.touches);
                touchState.pinchScaleStart = viewTransform.scale;
                // Store midpoint reference for focal point
                const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                touchState.pinchMidX = mx;
                touchState.pinchMidY = my;
                e.preventDefault();
            }
        }, { passive: false });

        pageContainer.addEventListener('touchmove', e => {
            if (touchState.mode === 'pan' && e.touches.length === 1) {
                const dx = e.touches[0].clientX - touchState.startX;
                const dy = e.touches[0].clientY - touchState.startY;
                viewTransform.x = touchState.startPanX + dx;
                viewTransform.y = touchState.startPanY + dy;
                applyTransform();
                e.preventDefault();
            } else if (touchState.mode === 'pinch' && e.touches.length === 2) {
                const newDist = getTouchDist(e.touches);
                const scaleChange = newDist / touchState.pinchDistStart;
                let newScale = touchState.pinchScaleStart * scaleChange;
                newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));

                // Adjust pan to keep the midpoint fixed
                const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const scaleRatio = newScale / viewTransform.scale;
                viewTransform.x = mx - (touchState.pinchMidX - viewTransform.x) * scaleRatio;
                viewTransform.y = my - (touchState.pinchMidY - viewTransform.y) * scaleRatio;
                viewTransform.scale = newScale;

                applyTransform();
                // Update zoom display in real time
                zoomLevelSpan.textContent = newScale.toFixed(1);
                e.preventDefault();
            }
        }, { passive: false });

        pageContainer.addEventListener('touchend', async e => {
            if (touchState.mode === 'pinch') {
                // Commit the final zoom level
                currentScale = viewTransform.scale;
                baseOffsetX = viewTransform.x;
                baseOffsetY = viewTransform.y;
                viewTransform = { scale: 1, x: 0, y: 0 };
                await renderPageAtExactScale(currentPage, currentScale);
                applyTransform();
                updatePagePosition();
                updateUI();
            } else if (touchState.mode === 'pan') {
                // Keep pan offset
                baseOffsetX = viewTransform.x;
                baseOffsetY = viewTransform.y;
            }
            touchState.mode = 'idle';
        });

        // ─── UI update ───
        function updateUI() {
            if (!pdfDoc) {
                pageInfo.textContent = '0 / 0';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                highlightBtn.disabled = true;
                removeBtn.disabled = true;
                zoomLevelSpan.textContent = '1.5';
            } else {
                pageInfo.textContent = `${currentPage} / ${totalPages}`;
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
                highlightBtn.disabled = false;
                removeBtn.disabled = false;
                zoomLevelSpan.textContent = currentScale.toFixed(1);
                zoomOutBtn.disabled = currentScale <= MIN_SCALE;
                zoomInBtn.disabled = currentScale >= MAX_SCALE;
            }
        }

        // ─── Preload adjacent pages (optional caching) ───
        async function preloadAdjacent(pageNum) {
            // Simple caching: just store bitmap for next/prev
            [pageNum - 1, pageNum + 1].forEach(async p => {
                if (p >= 1 && p <= totalPages) {
                    try {
                        const page = await pdfDoc.getPage(p);
                        const renderScale = 2 * dpr;
                        const viewport = page.getViewport({ scale: renderScale });
                        const offCanvas = document.createElement('canvas');
                        offCanvas.width = viewport.width;
                        offCanvas.height = viewport.height;
                        const offCtx = offCanvas.getContext('2d');
                        await page.render({ canvasContext: offCtx, viewport }).promise;
                        // just warming up, keep it simple
                    } catch(e) {}
                }
            });
        }

        // ─── Load PDF ───
        function loadPdf(file) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                const typedArray = new Uint8Array(e.target.result);
                try {
                    pdfDoc = await pdfjsLib.getDocument({
                        data: typedArray,
                        disableAutoFetch: false,
                        disableStream: false
                    }).promise;
                    totalPages = pdfDoc.numPages;
                    highlights = {};
                    currentPage = 1;
                    await goToPage(1);
                } catch (err) {
                    alert('Error loading PDF: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ─── Events ───
        fileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) loadPdf(e.target.files[0]);
        });
        prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
        nextBtn.addEventListener('click', () => goToPage(currentPage + 1));
        highlightBtn.addEventListener('click', addHighlightFromSelection);
        removeBtn.addEventListener('click', removeLastHighlight);
        canvas.addEventListener('click', handleCanvasClick);

        // Initial UI
        updateUI();
    </script>
</body>
</html>
