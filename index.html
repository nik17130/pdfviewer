<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>PDF Highlighter</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #333; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Toolbar – fully responsive */
        #toolbar {
            background: #222; padding: 6px; display: flex; flex-wrap: wrap;
            align-items: center; gap: 6px; position: fixed; top: 0; width: 100%; z-index: 10;
            min-height: 50px;
        }
        #toolbar button, #toolbar input {
            font-size: 13px; padding: 6px 8px; border: none; border-radius: 4px;
            background: #444; color: white; white-space: nowrap;
        }
        #toolbar button:disabled { opacity: 0.4; }
        #fileInput { width: auto; min-width: 80px; background: #555; }
        #toolbar span { font-size: 12px; color: #aaa; white-space: nowrap; }
        
        /* Page container – enables custom pinch zoom */
        #page-container {
            margin-top: 60px; flex: 1; overflow: auto; display: flex;
            justify-content: center; padding: 10px; background: #525659;
            touch-action: none;  /* we handle gestures ourselves */
            position: relative;
        }
        
        .page-wrapper {
            position: relative; margin-bottom: 10px;
            transform-origin: 0 0;
        }
        canvas { display: block; }
        
        .textLayer {
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden; opacity: 0.25; line-height: 1.0; color: transparent;
        }
        .textLayer span {
            color: transparent; position: absolute; white-space: pre;
            cursor: text; transform-origin: 0% 0%;
        }
        .textLayer ::selection { background: rgba(0,0,255,0.3); }
        
        /* Adjust on small screens */
        @media (max-width: 400px) {
            #toolbar button { font-size: 11px; padding: 5px 6px; }
            #toolbar span { font-size: 11px; }
            #page-container { margin-top: 56px; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="fileInput" accept="application/pdf">
        <button id="prevBtn" disabled>◀ Prev</button>
        <span id="pageInfo">0 / 0</span>
        <button id="nextBtn" disabled>Next ▶</button>
        <button id="highlightBtn" disabled>Highlight</button>
        <button id="removeBtn" disabled>Undo</button>
        <button id="zoomOutBtn" disabled>− Zoom</button>
        <button id="zoomInBtn" disabled>+ Zoom</button>
        <span> | Scale: <span id="zoomLevel">1.5</span>x</span>
        <span style="font-size:11px; color:#aaa;">(Tap highlight to delete)</span>
    </div>

    <div id="page-container">
        <div class="page-wrapper" id="pageWrapper">
            <canvas id="pdfCanvas"></canvas>
            <div id="textLayer" class="textLayer"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomLevelSpan = document.getElementById('zoomLevel');
        const pageInfo = document.getElementById('pageInfo');
        const highlightBtn = document.getElementById('highlightBtn');
        const removeBtn = document.getElementById('removeBtn');
        const canvas = document.getElementById('pdfCanvas');
        const textLayerDiv = document.getElementById('textLayer');
        const pageWrapper = document.getElementById('pageWrapper');
        const pageContainer = document.getElementById('page-container');
        const ctx = canvas.getContext('2d');

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let scale = 1.5;
        const MIN_SCALE = 0.5;
        const MAX_SCALE = 3.0;
        let highlights = {};

        // ---------- Zoom via buttons ----------
        function updateZoomDisplay() {
            zoomLevelSpan.textContent = scale.toFixed(1);
            zoomOutBtn.disabled = (scale <= MIN_SCALE || !pdfDoc);
            zoomInBtn.disabled = (scale >= MAX_SCALE || !pdfDoc);
        }

        function setScale(newScale) {
            if (newScale < MIN_SCALE) newScale = MIN_SCALE;
            if (newScale > MAX_SCALE) newScale = MAX_SCALE;
            if (newScale !== scale) {
                scale = newScale;
                if (pdfDoc) renderPage(currentPage);
            }
            updateZoomDisplay();
        }

        zoomInBtn.addEventListener('click', () => setScale(scale + 0.25));
        zoomOutBtn.addEventListener('click', () => setScale(scale - 0.25));

        // ---------- Pinch-to-zoom that stays centred ----------
        let lastDist = 0;
        let lastScale = scale;
        let lastMidX = 0, lastMidY = 0;   // midpoint relative to the page-wrapper

        pageContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastDist = Math.sqrt(dx*dx + dy*dy);
                lastScale = scale;
                // Calculate midpoint of the two fingers relative to the page-wrapper
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                const wrapperRect = pageWrapper.getBoundingClientRect();
                lastMidX = midX - wrapperRect.left;
                lastMidY = midY - wrapperRect.top;
                e.preventDefault();
            }
        }, { passive: false });

        pageContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && lastDist > 0) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const newDist = Math.sqrt(dx*dx + dy*dy);
                const factor = newDist / lastDist;
                let newScale = lastScale * factor;
                newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
                
                // Apply visual zoom with correct origin
                pageWrapper.style.transformOrigin = `${lastMidX}px ${lastMidY}px`;
                pageWrapper.style.transform = `scale(${newScale})`;
                
                // Update displayed scale
                zoomLevelSpan.textContent = newScale.toFixed(1);
                scale = newScale;
                updateZoomDisplay();
                e.preventDefault();
            }
        }, { passive: false });

        pageContainer.addEventListener('touchend', (e) => {
            if (lastDist > 0) {
                // Finalise: remove transform and re-render at the new scale
                pageWrapper.style.transform = '';
                pageWrapper.style.transformOrigin = '0 0';
                if (pdfDoc) renderPage(currentPage);
                lastDist = 0;
            }
        });

        // ---------- PDF rendering ----------
        function loadPdf(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const typedArray = new Uint8Array(e.target.result);
                pdfjsLib.getDocument(typedArray).promise
                .then(pdf => {
                    pdfDoc = pdf;
                    totalPages = pdf.numPages;
                    currentPage = 1;
                    highlights = {};
                    renderPage(currentPage);
                })
                .catch(err => alert('Error loading PDF: ' + err.message));
            };
            reader.readAsArrayBuffer(file);
        }

        async function renderPage(pageNum) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = viewport.width + 'px';
            canvas.style.height = viewport.height + 'px';
            textLayerDiv.innerHTML = '';
            textLayerDiv.style.width = viewport.width + 'px';
            textLayerDiv.style.height = viewport.height + 'px';
            const renderContext = { canvasContext: ctx, viewport };
            await page.render(renderContext).promise;
            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({
                textContentSource: textContent,
                container: textLayerDiv,
                viewport,
                textDivs: []
            });
            drawHighlights(pageNum);
            updateUI();
        }

        function drawHighlights(pageNum) {
            if (!highlights[pageNum]) return;
            highlights[pageNum].forEach(h => {
                ctx.fillStyle = h.color || 'rgba(255,255,0,0.4)';
                ctx.fillRect(h.x, h.y, h.w, h.h);
            });
        }

        function addHighlightFromSelection() {
            const selection = window.getSelection();
            if (!selection.rangeCount) { alert('Select some text first.'); return; }
            const range = selection.getRangeAt(0);
            const canvasRect = canvas.getBoundingClientRect();
            if (!highlights[currentPage]) highlights[currentPage] = [];
            const rects = range.getClientRects();
            for (let i = 0; i < rects.length; i++) {
                let r = rects[i];
                const x = r.left - canvasRect.left;
                const y = r.top - canvasRect.top;
                const w = r.width;
                const h = r.height;
                if (w > 0 && h > 0) {
                    highlights[currentPage].push({ x, y, w, h, color: 'rgba(255,255,0,0.4)' });
                }
            }
            selection.removeAllRanges();
            renderPage(currentPage);
        }

        function removeLastHighlight() {
            if (!highlights[currentPage] || highlights[currentPage].length === 0) {
                alert('No highlight on this page.'); return;
            }
            highlights[currentPage].pop();
            renderPage(currentPage);
        }

        function handleCanvasClick(e) {
            if (!highlights[currentPage]) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const pageHighlights = highlights[currentPage];
            for (let i = pageHighlights.length - 1; i >= 0; i--) {
                const h = pageHighlights[i];
                if (mouseX >= h.x && mouseX <= h.x + h.w &&
                    mouseY >= h.y && mouseY <= h.y + h.h) {
                    pageHighlights.splice(i, 1);
                    renderPage(currentPage);
                    return;
                }
            }
        }

        function updateUI() {
            if (!pdfDoc) {
                pageInfo.textContent = '0 / 0';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                highlightBtn.disabled = true;
                removeBtn.disabled = true;
            } else {
                pageInfo.textContent = `${currentPage} / ${totalPages}`;
                prevBtn.disabled = (currentPage <= 1);
                nextBtn.disabled = (currentPage >= totalPages);
                highlightBtn.disabled = false;
                removeBtn.disabled = false;
            }
            updateZoomDisplay();
        }

        function goToPage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            currentPage = newPage;
            renderPage(currentPage);
        }

        // ---------- Event listeners ----------
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadPdf(e.target.files[0]);
        });
        prevBtn.addEventListener('click', () => goToPage(-1));
        nextBtn.addEventListener('click', () => goToPage(1));
        highlightBtn.addEventListener('click', addHighlightFromSelection);
        removeBtn.addEventListener('click', removeLastHighlight);
        canvas.addEventListener('click', handleCanvasClick);
        updateUI();
    </script>
</body>
</html>
