<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Highlighter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #333; color: white; display: flex; flex-direction: column; height: 100vh; }
        #toolbar {
            background: #222; padding: 8px; display: flex; flex-wrap: wrap;
            align-items: center; gap: 8px; position: fixed; top: 0; width: 100%; z-index: 10;
        }
        #toolbar button, #toolbar input { font-size: 14px; padding: 6px 10px; }
        #page-container {
            margin-top: 60px; flex: 1; overflow: auto; display: flex;
            justify-content: center; padding: 10px; background: #525659;
        }
        .page-wrapper { position: relative; margin-bottom: 10px; }
        canvas { display: block; }
        .textLayer {
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden; opacity: 0.25; line-height: 1.0; color: transparent;
        }
        .textLayer span {
            color: transparent; position: absolute; white-space: pre;
            cursor: text; transform-origin: 0% 0%;
        }
        .textLayer ::selection { background: rgba(0,0,255,0.3); }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="fileInput" accept="application/pdf">
        <button id="prevBtn" disabled>◀ Prev</button>
        <span id="pageInfo">Page 0 / 0</span>
        <button id="nextBtn" disabled>Next ▶</button>
        <button id="highlightBtn" disabled>Highlight Selected</button>
        <button id="removeBtn" disabled>Remove Last Highlight</button>
        <span style="font-size:12px; color:#aaa;">(Tap a highlight to remove it)</span>
    </div>
    <div id="page-container">
        <div class="page-wrapper">
            <canvas id="pdfCanvas"></canvas>
            <div id="textLayer" class="textLayer"></div>
        </div>
    </div>

    <!-- Load PDF.js from CDN – no local files needed -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');
        const highlightBtn = document.getElementById('highlightBtn');
        const removeBtn = document.getElementById('removeBtn');
        const canvas = document.getElementById('pdfCanvas');
        const textLayerDiv = document.getElementById('textLayer');
        const ctx = canvas.getContext('2d');

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let scale = 1.5;
        let highlights = {};   // { pageNum: [ {x,y,w,h,color} ] }

        function loadPdf(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const typedArray = new Uint8Array(e.target.result);
                pdfjsLib.getDocument(typedArray).promise
                .then(pdf => {
                    pdfDoc = pdf;
                    totalPages = pdf.numPages;
                    currentPage = 1;
                    highlights = {};
                    renderPage(currentPage);
                    updateUI();
                })
                .catch(err => alert('Error loading PDF: ' + err.message));
            };
            reader.readAsArrayBuffer(file);
        }

        async function renderPage(pageNum) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = viewport.width + 'px';
            canvas.style.height = viewport.height + 'px';
            textLayerDiv.innerHTML = '';
            textLayerDiv.style.width = viewport.width + 'px';
            textLayerDiv.style.height = viewport.height + 'px';
            const renderContext = { canvasContext: ctx, viewport };
            await page.render(renderContext).promise;
            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({
                textContentSource: textContent,
                container: textLayerDiv,
                viewport,
                textDivs: []
            });
            drawHighlights(pageNum);
            updateUI();
        }

        function drawHighlights(pageNum) {
            if (!highlights[pageNum]) return;
            highlights[pageNum].forEach(h => {
                ctx.fillStyle = h.color || 'rgba(255,255,0,0.4)';
                ctx.fillRect(h.x, h.y, h.w, h.h);
            });
        }

        function addHighlightFromSelection() {
            const selection = window.getSelection();
            if (!selection.rangeCount) { alert('Please select some text first.'); return; }
            const range = selection.getRangeAt(0);
            const canvasRect = canvas.getBoundingClientRect();
            if (!highlights[currentPage]) highlights[currentPage] = [];
            const rects = range.getClientRects();
            for (let i = 0; i < rects.length; i++) {
                let r = rects[i];
                const x = r.left - canvasRect.left;
                const y = r.top - canvasRect.top;
                const w = r.width;
                const h = r.height;
                if (w > 0 && h > 0) {
                    highlights[currentPage].push({ x, y, w, h, color: 'rgba(255,255,0,0.4)' });
                }
            }
            selection.removeAllRanges();
            renderPage(currentPage);
        }

        function removeLastHighlight() {
            if (!highlights[currentPage] || highlights[currentPage].length === 0) {
                alert('No highlight on this page.'); return;
            }
            highlights[currentPage].pop();
            renderPage(currentPage);
        }

        function handleCanvasClick(e) {
            if (!highlights[currentPage]) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const pageHighlights = highlights[currentPage];
            for (let i = pageHighlights.length - 1; i >= 0; i--) {
                const h = pageHighlights[i];
                if (mouseX >= h.x && mouseX <= h.x + h.w &&
                    mouseY >= h.y && mouseY <= h.y + h.h) {
                    pageHighlights.splice(i, 1);
                    renderPage(currentPage);
                    return;
                }
            }
        }

        function updateUI() {
            if (!pdfDoc) {
                pageInfo.textContent = 'Page 0 / 0';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                highlightBtn.disabled = true;
                removeBtn.disabled = true;
                return;
            }
            pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
            prevBtn.disabled = (currentPage <= 1);
            nextBtn.disabled = (currentPage >= totalPages);
            highlightBtn.disabled = false;
            removeBtn.disabled = false;
        }

        function goToPage(delta) {
            const newPage = currentPage + delta;
            if (newPage < 1 || newPage > totalPages) return;
            currentPage = newPage;
            renderPage(currentPage);
        }

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadPdf(e.target.files[0]);
        });
        prevBtn.addEventListener('click', () => goToPage(-1));
        nextBtn.addEventListener('click', () => goToPage(1));
        highlightBtn.addEventListener('click', addHighlightFromSelection);
        removeBtn.addEventListener('click', removeLastHighlight);
        canvas.addEventListener('click', handleCanvasClick);
        updateUI();
    </script>
</body>
</html>
