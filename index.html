<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Highlighter</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: sans-serif; background:#333; color:#fff; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        #toolbar {
            background:#222; padding:6px; display:flex; flex-wrap:wrap;
            align-items:center; gap:6px; position:fixed; top:0; width:100%; z-index:10;
            min-height:50px;
        }
        #toolbar button, #toolbar input {
            font-size:13px; padding:6px 8px; border:none; border-radius:4px;
            background:#444; color:#fff; white-space:nowrap;
        }
        #toolbar button:disabled { opacity:0.4; }
        #fileInput { width:auto; min-width:80px; background:#555; }
        #toolbar span { font-size:12px; color:#aaa; white-space:nowrap; }

        #page-container {
            margin-top:60px; flex:1; overflow:auto; background:#525659;
            touch-action:none;  /* we control gestures */
            position:relative;
            display:flex; justify-content:center;
        }
        .page-wrapper { position:relative; transform-origin:0 0; }
        canvas { display:block; }
        .textLayer {
            position:absolute; left:0; top:0; right:0; bottom:0;
            overflow:hidden; opacity:0.25; line-height:1.0; color:transparent;
            pointer-events:auto;   /* allow text selection */
        }
        .textLayer span {
            color:transparent; position:absolute; white-space:pre;
            cursor:text; transform-origin:0% 0%;
        }
        .textLayer ::selection { background: rgba(0,0,255,0.3); }

        @media (max-width:400px) {
            #toolbar button { font-size:11px; padding:5px 6px; }
            #toolbar span { font-size:11px; }
            #page-container { margin-top:56px; }
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <input type="file" id="fileInput" accept="application/pdf">
        <button id="prevBtn" disabled>◀ Prev</button>
        <span id="pageInfo">0 / 0</span>
        <button id="nextBtn" disabled>Next ▶</button>
        <button id="highlightBtn" disabled>Highlight</button>
        <button id="removeBtn" disabled>Undo</button>
        <button id="zoomOutBtn" disabled>− Zoom</button>
        <button id="zoomInBtn" disabled>+ Zoom</button>
        <span>Scale: <span id="zoomLevel">1.5</span>x</span>
        <span style="font-size:11px; color:#aaa;">(Tap highlight to delete)</span>
    </div>

    <div id="page-container">
        <div class="page-wrapper" id="pageWrapper">
            <canvas id="pdfCanvas"></canvas>
            <div id="textLayer" class="textLayer"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // ─── DOM refs ───
        const fileInput = document.getElementById('fileInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomLevelSpan = document.getElementById('zoomLevel');
        const pageInfo = document.getElementById('pageInfo');
        const highlightBtn = document.getElementById('highlightBtn');
        const removeBtn = document.getElementById('removeBtn');
        const canvas = document.getElementById('pdfCanvas');
        const textLayerDiv = document.getElementById('textLayer');
        const pageWrapper = document.getElementById('pageWrapper');
        const pageContainer = document.getElementById('page-container');
        const ctx = canvas.getContext('2d');

        // ─── Settings ───
        const dpr = window.devicePixelRatio || 1;
        const MAX_RENDER_SCALE = 3.0;       // highest zoom we always render at
        const MIN_SCALE = 0.5;
        const MAX_SCALE = 3.0;

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let currentScale = 1.5;              // user‑visible zoom level

        // Highlights stored in PDF point coordinates (page width/height at scale=1)
        let highlights = {};                 // { pageNum: [ {x, y, w, h, color} ] }
        let pageSize = {};                   // { pageNum: {width, height} } in points

        // Page image cache: stores ImageBitmap for fast scaling
        const pageImageCache = new Map();    // pageNum -> ImageBitmap

        // Navigation cache (instant back/forth)
        const renderedPages = new Set();

        // ─── Utility: get pageSize (points) ───
        async function getPageSize(pageNum) {
            if (pageSize[pageNum]) return pageSize[pageNum];
            const page = await pdfDoc.getPage(pageNum);
            const vp = page.getViewport({ scale: 1 });
            pageSize[pageNum] = { width: vp.width, height: vp.height };
            return pageSize[pageNum];
        }

        // ─── Render page to high‑res image & cache ───
        async function cachePageImage(pageNum) {
            if (pageImageCache.has(pageNum)) return pageImageCache.get(pageNum);
            const page = await pdfDoc.getPage(pageNum);
            const renderScale = MAX_RENDER_SCALE * dpr;
            const viewport = page.getViewport({ scale: renderScale });

            const offCanvas = document.createElement('canvas');
            offCanvas.width = viewport.width;
            offCanvas.height = viewport.height;
            const offCtx = offCanvas.getContext('2d');
            await page.render({ canvasContext: offCtx, viewport }).promise;

            const bitmap = await createImageBitmap(offCanvas);
            pageImageCache.set(pageNum, bitmap);
            return bitmap;
        }

        // ─── Draw the cached image onto the visible canvas at currentScale ───
        async function drawPageAtScale(pageNum, scale) {
            const size = await getPageSize(pageNum);
            const img = await cachePageImage(pageNum);
            const displayWidth = size.width * scale;
            const displayHeight = size.height * scale;

            canvas.width = displayWidth * dpr;
            canvas.height = displayHeight * dpr;
            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // Rebuild text layer at logical size
            await buildTextLayer(pageNum, scale);
            drawHighlights(pageNum, scale);
        }

        // ─── Text layer (for selection) ───
        async function buildTextLayer(pageNum, scale) {
            textLayerDiv.innerHTML = '';
            const size = await getPageSize(pageNum);
            textLayerDiv.style.width = (size.width * scale) + 'px';
            textLayerDiv.style.height = (size.height * scale) + 'px';

            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale });
            const textContent = await page.getTextContent();
            await pdfjsLib.renderTextLayer({
                textContentSource: textContent,
                container: textLayerDiv,
                viewport,
                textDivs: []
            });
        }

        // ─── Highlight drawing (coords in points) ───
        function drawHighlights(pageNum, scale) {
            if (!highlights[pageNum] || !pageSize[pageNum]) return;
            const { width: pw, height: ph } = pageSize[pageNum];
            const factor = scale * dpr;   // canvas pixels per point
            ctx.save();
            highlights[pageNum].forEach(h => {
                ctx.fillStyle = h.color || 'rgba(255,255,0,0.4)';
                ctx.fillRect(h.x * factor, h.y * factor, h.w * factor, h.h * factor);
            });
            ctx.restore();
        }

        // ─── Add highlight from current text selection ───
        async function addHighlightFromSelection() {
            const selection = window.getSelection();
            if (!selection.rangeCount) { alert('Select some text first.'); return; }
            const range = selection.getRangeAt(0);
            const canvasRect = canvas.getBoundingClientRect();
            const scale = currentScale;  // logical scale
            const { width: pw, height: ph } = pageSize[currentPage];
            if (!highlights[currentPage]) highlights[currentPage] = [];

            const rects = range.getClientRects();
            for (let i = 0; i < rects.length; i++) {
                let r = rects[i];
                // Convert canvas‑relative coords to point coords
                const x = (r.left - canvasRect.left) / scale;
                const y = (r.top - canvasRect.top) / scale;
                const w = r.width / scale;
                const h = r.height / scale;
                if (w > 0 && h > 0) {
                    highlights[currentPage].push({ x, y, w, h, color: 'rgba(255,255,0,0.4)' });
                }
            }
            selection.removeAllRanges();
            await drawPageAtScale(currentPage, currentScale);
        }

        // ─── Remove last highlight ───
        async function removeLastHighlight() {
            if (!highlights[currentPage] || highlights[currentPage].length === 0) {
                alert('No highlight on this page.'); return;
            }
            highlights[currentPage].pop();
            await drawPageAtScale(currentPage, currentScale);
        }

        // ─── Tap on canvas to remove highlight (point coords) ───
        async function handleCanvasClick(e) {
            if (!highlights[currentPage]) return;
            const canvasRect = canvas.getBoundingClientRect();
            // Mouse position in logical (display) coordinates
            const mx = e.clientX - canvasRect.left;
            const my = e.clientY - canvasRect.top;
            const scale = currentScale;
            // Convert to point space
            const px = mx / scale;
            const py = my / scale;

            const pageHighlights = highlights[currentPage];
            for (let i = pageHighlights.length - 1; i >= 0; i--) {
                const h = pageHighlights[i];
                if (px >= h.x && px <= h.x + h.w && py >= h.y && py <= h.y + h.h) {
                    pageHighlights.splice(i, 1);
                    await drawPageAtScale(currentPage, currentScale);
                    return;
                }
            }
        }

        // ─── Navigation ───
        async function goToPage(pageNum) {
            if (pageNum < 1 || pageNum > totalPages) return;
            currentPage = pageNum;
            await drawPageAtScale(currentPage, currentScale);
            updateUI();
            preloadAdjacent(pageNum);
        }

        async function prevPage() { if (currentPage > 1) await goToPage(currentPage - 1); }
        async function nextPage() { if (currentPage < totalPages) await goToPage(currentPage + 1); }

        // ─── Zoom buttons ───
        async function setScale(newScale) {
            if (newScale < MIN_SCALE) newScale = MIN_SCALE;
            if (newScale > MAX_SCALE) newScale = MAX_SCALE;
            if (newScale !== currentScale) {
                currentScale = newScale;
                await drawPageAtScale(currentPage, currentScale);
            }
            updateZoomDisplay();
        }

        zoomInBtn.addEventListener('click', () => setScale(currentScale + 0.25));
        zoomOutBtn.addEventListener('click', () => setScale(currentScale - 0.25));

        function updateZoomDisplay() {
            zoomLevelSpan.textContent = currentScale.toFixed(1);
            zoomOutBtn.disabled = currentScale <= MIN_SCALE || !pdfDoc;
            zoomInBtn.disabled = currentScale >= MAX_SCALE || !pdfDoc;
        }

        // ─── Preload adjacent pages ───
        function preloadAdjacent(pageNum) {
            [pageNum - 1, pageNum + 1].forEach(p => {
                if (p >= 1 && p <= totalPages && !pageImageCache.has(p)) {
                    cachePageImage(p).catch(() => {});
                }
            });
        }

        // ─── Pinch‑to‑zoom with fixed focal point ───
        let pinchStartDist = 0;
        let pinchStartScale = 1;
        let pinchMidX = 0, pinchMidY = 0;   // relative to viewport

        pageContainer.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                pinchStartDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                pinchStartScale = currentScale;
                pinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - pageContainer.getBoundingClientRect().left;
                pinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - pageContainer.getBoundingClientRect().top;
                e.preventDefault();
            }
        }, { passive: false });

        pageContainer.addEventListener('touchmove', e => {
            if (e.touches.length === 2 && pinchStartDist > 0) {
                const newDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = newDist / pinchStartDist;
                let newScale = pinchStartScale * factor;
                newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));

                // Keep focal point fixed
                const containerRect = pageContainer.getBoundingClientRect();
                const contentXBefore = pinchMidX + pageContainer.scrollLeft;
                const contentYBefore = pinchMidY + pageContainer.scrollTop;

                const ratio = newScale / currentScale;
                currentScale = newScale;

                // Update canvas instantly (scaling the cached image)
                drawPageAtScale(currentPage, currentScale).then(() => {
                    // Adjust scroll to keep focal point stationary
                    const newScrollLeft = contentXBefore * ratio - pinchMidX;
                    const newScrollTop = contentYBefore * ratio - pinchMidY;
                    pageContainer.scrollLeft = newScrollLeft;
                    pageContainer.scrollTop = newScrollTop;
                });

                zoomLevelSpan.textContent = newScale.toFixed(1);
                updateZoomDisplay();
                e.preventDefault();
            }
        }, { passive: false });

        pageContainer.addEventListener('touchend', e => {
            pinchStartDist = 0;
        });

        // ─── Panning (single finger drag) ───
        let panStartX, panStartY, panScrollLeft, panScrollTop;
        pageContainer.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                panStartX = e.touches[0].clientX;
                panStartY = e.touches[0].clientY;
                panScrollLeft = pageContainer.scrollLeft;
                panScrollTop = pageContainer.scrollTop;
            }
        });

        pageContainer.addEventListener('touchmove', e => {
            if (e.touches.length === 1 && panStartX !== undefined) {
                const dx = e.touches[0].clientX - panStartX;
                const dy = e.touches[0].clientY - panStartY;
                pageContainer.scrollLeft = panScrollLeft - dx;
                pageContainer.scrollTop = panScrollTop - dy;
                e.preventDefault();
            }
        }, { passive: false });

        // ─── Load PDF ───
        function loadPdf(file) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                const typedArray = new Uint8Array(e.target.result);
                try {
                    pdfDoc = await pdfjsLib.getDocument({
                        data: typedArray,
                        disableAutoFetch: false,
                        disableStream: false
                    }).promise;
                    totalPages = pdfDoc.numPages;
                    currentPage = 1;
                    highlights = {};
                    pageSize = {};
                    pageImageCache.clear();
                    await goToPage(1);
                } catch (err) {
                    alert('Error loading PDF: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ─── UI state ───
        function updateUI() {
            if (!pdfDoc) {
                pageInfo.textContent = '0 / 0';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                highlightBtn.disabled = true;
                removeBtn.disabled = true;
            } else {
                pageInfo.textContent = `${currentPage} / ${totalPages}`;
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = currentPage >= totalPages;
                highlightBtn.disabled = false;
                removeBtn.disabled = false;
            }
            updateZoomDisplay();
        }

        // ─── Event bindings ───
        fileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) loadPdf(e.target.files[0]);
        });
        prevBtn.addEventListener('click', prevPage);
        nextBtn.addEventListener('click', nextPage);
        highlightBtn.addEventListener('click', addHighlightFromSelection);
        removeBtn.addEventListener('click', removeLastHighlight);
        canvas.addEventListener('click', handleCanvasClick);

        updateUI();
    </script>
</body>
    </html>
